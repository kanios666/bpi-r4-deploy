name: Build BPI-R4 Deploy

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        required: true
        default: 'standard'
        type: choice
        options:
          - standard
          - wired
      repo_commit:
        description: 'Commit hash of this repository (leave empty for latest)'
        required: false
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OPENWRT_COMMIT: "13ff2256e5dd9bc070f9a9c6a673bff4a9191837"
  MTK_COMMIT: "dceb45f8cb945bce16f0e09f8d2cd974c9f0ce58"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.repo_commit || github.sha }}

      - name: Set build variables
        run: |
          VARIANT="${{ github.event.inputs.variant }}"

          if [ "$VARIANT" = "wired" ]; then
            echo "BUILDER=./builder-wired-universal.sh" >> $GITHUB_ENV
            echo "RELEASE_TAGS=release-4gb-wired release-4gb-poe-wired release-8gb-wired release-8gb-poe-wired release-8gb-wired-unifi release-8gb-poe-wired-unifi" >> $GITHUB_ENV
          else
            echo "BUILDER=./builder-wifimgr-universal.sh" >> $GITHUB_ENV
            echo "RELEASE_TAGS=release-4gb-standard" >> $GITHUB_ENV
          fi

      - name: Delete existing releases and tags
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const tags = process.env.RELEASE_TAGS.split(' ');

            const releases = await github.rest.repos.listReleases({
              owner,
              repo,
              per_page: 100
            });

            for (const tag of tags) {
              for (const rel of releases.data) {
                if (rel.tag_name === tag) {
                  await github.rest.repos.deleteRelease({
                    owner,
                    repo,
                    release_id: rel.id
                  }).catch(e => console.log(`Failed to delete release ${rel.id}: ${e.message}`));
                }
              }
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `tags/${tag}`
              }).catch(e => console.log(`Failed to delete tag ${tag}: ${e.message}`));
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Free disk space on runner
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext libncurses-dev libssl-dev python3-distutils python3-setuptools \
            rsync swig unzip zlib1g-dev file wget libelf-dev ccache git

      - name: Restore repository cache
        id: cache-repos
        uses: actions/cache@v4
        with:
          path: |
            repo-cache/openwrt.tar.gz
            repo-cache/mtk-openwrt-feeds.tar.gz
          key: repos-${{ env.OPENWRT_COMMIT }}-${{ env.MTK_COMMIT }}

      - name: Clone and cache repositories
        if: steps.cache-repos.outputs.cache-hit != 'true'
        run: |
          mkdir -p repo-cache

          git clone --branch openwrt-25.12 https://github.com/openwrt/openwrt.git openwrt-clone
          cd openwrt-clone && git checkout ${{ env.OPENWRT_COMMIT }} && cd ..
          tar -czf repo-cache/openwrt.tar.gz openwrt-clone
          rm -rf openwrt-clone

          git clone --branch master https://git01.mediatek.com/openwrt/feeds/mtk-openwrt-feeds mtk-clone
          cd mtk-clone && git checkout ${{ env.MTK_COMMIT }} && cd ..
          tar -czf repo-cache/mtk-openwrt-feeds.tar.gz mtk-clone
          rm -rf mtk-clone

      - name: Run builder script
        run: |
          chmod +x ${{ env.BUILDER }}
          ${{ env.BUILDER }}
        env:
          OPENWRT_COMMIT: ${{ env.OPENWRT_COMMIT }}
          MTK_COMMIT: ${{ env.MTK_COMMIT }}

      - name: Prepare release artifacts
        run: |
          VARIANT="${{ github.event.inputs.variant }}"
          FILOGIC="openwrt/bin/targets/mediatek/filogic"

          # Prepare artifact directory for one release tag
          # Args: dir, itb_src, itb_dst, nvme, sdcard, emmc, snand
          make_release_dir() {
            local DIR="$1"
            local ITB_SRC="$2"
            local ITB_DST="$3"
            local NVME="$4"
            local SDCARD="$5"
            local EMMC="$6"
            local SNAND="$7"

            mkdir -p "$DIR"
            cp "${FILOGIC}/${ITB_SRC}"   "${DIR}/${ITB_DST}"
            cp "${FILOGIC}/${NVME}"      "${DIR}/${NVME}"
            cp "${FILOGIC}/${SDCARD}"    "${DIR}/${SDCARD}"
            cp "${FILOGIC}/${EMMC}"      "${DIR}/${EMMC}"
            cp "${FILOGIC}/${SNAND}"     "${DIR}/${SNAND}"
            cp "${FILOGIC}/config.buildinfo" "${DIR}/"
            cd "$DIR"
            sha256sum "${ITB_DST}" "${NVME}" "${SDCARD}" "${EMMC}" "${SNAND}" > sha256sums
            cd ..
          }

          # 4GB non-poe
          make_release_dir rel-4gb \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-squashfs-sysupgrade.itb" \
            "bpi-r4.itb" \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-nvme-img.bin" \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-sdcard.img.gz" \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-emmc-img.bin" \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-snand-img.bin"





          # SD rescue image into all release dirs
          for DIR in rel-4gb; do
            cp rescue/bpi-r4-rescue-sdcard.img.gz "$DIR/"
          done

          # UniFi variants = same firmware as 8gb wired + UniFi scripts
          if [ "$VARIANT" = "wired" ]; then
            cp -r rel-4gb     rel-4gb-wired
            cp -r rel-4gb-poe rel-4gb-poe-wired
            cp -r rel-8gb     rel-8gb-wired
            cp -r rel-8gb-poe rel-8gb-poe-wired

            cp -r rel-8gb     rel-8gb-unifi
            cp -r rel-8gb-poe rel-8gb-poe-unifi

            for DIR in rel-8gb-unifi rel-8gb-poe-unifi; do
              cp unifi/unifi-setup.sh             "$DIR/"
              cp unifi/rc.local                   "$DIR/"
              cp unifi/rc-network.sh              "$DIR/"
              cp unifi/unifi-network-setup-8gb.sh "$DIR/unifi-network-setup.sh"
            done
          fi

      - name: Publish luci-app-wifimgr APK
        if: github.event.inputs.variant == 'standard'
        run: |
          APK=$(ls openwrt/bin/packages/aarch64_cortex-a53/luci/luci-app-wifimgr-*.apk 2>/dev/null | head -1)
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "APK_NAME=$(basename $APK)" >> $GITHUB_ENV

      - name: Publish wifimgr-latest release
        if: github.event.inputs.variant == 'standard'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wifimgr-latest
          name: "luci-app-wifimgr (latest)"
          body: |
            Standalone APK for luci-app-wifimgr — install on any BPI-R4 running this firmware.

            ```
            apk add --allow-untrusted --no-network /tmp/${{ env.APK_NAME }}
            ```

            Built from commit: ${{ github.event.inputs.repo_commit || github.sha }}
          files: ${{ env.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release-4gb-standard
        if: github.event.inputs.variant == 'standard'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-4gb-standard
          name: "BPI-R4 4GB standard WiFi (latest)"
          body: |
            Variant: standard (WiFi) | RAM: 4GB
            Commit: ${{ github.event.inputs.repo_commit || github.sha }}
          files: rel-4gb/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

     
